<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GitHub Shortcut Badges</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; padding: 16px; line-height: 1.6; color: #111; }
      h1 { font-size: 18px; margin: 0 0 16px; }
      .field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
      label { font-weight: 600; }
      select, input[type="checkbox"] { font-size: 14px; }
      .note { color: #555; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>GitHub Shortcut Badges</h1>
    <div class="field">
      <label for="platform">Platform</label>
      <select id="platform">
        <option value="auto">auto (detect)</option>
        <option value="mac">macOS</option>
        <option value="windows">Windows</option>
        <option value="linux">Linux</option>
      </select>
    </div>
    <div class="field">
      <label for="show-all">
        <input id="show-all" type="checkbox" />
        Show all alternative shortcuts
      </label>
      <p class="note">チェックすると "Ctrl K / Ctrl G" のように代替ショートカットも並列表記します。</p>
    </div>
    <div class="field">
      <label for="badge-size">Badge size</label>
      <select id="badge-size">
        <option value="sm">Small</option>
        <option value="md">Medium</option>
        <option value="lg">Large</option>
      </select>
    </div>
    <script src="options.js"></script>
  </body>
</html>
